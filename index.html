<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <meta name="application-name" content="Çalışmıyo" />
    <title>Çalışmıyo</title>
  </head>
  <body>
    <div
      id="vite-file-warning"
      hidden
      style="
        box-sizing: border-box;
        margin: 0;
        padding: 1.5rem;
        font-family: system-ui, sans-serif;
        line-height: 1.5;
        color: #0f172a;
        background: #fef3c7;
        border-bottom: 3px solid #f59e0b;
      "
    ></div>
    <script>
      ;(function () {
        if (window.location.protocol === 'file:') {
          var el = document.getElementById('vite-file-warning')
          el.hidden = false
          el.innerHTML =
            '<strong>Bu sayfayı dosya olarak açamazsınız.</strong><br />' +
            'Proje klasöründe terminal açıp şunu çalıştırın: <code style="background:#fff;padding:2px 8px;border-radius:6px">npm run dev</code><br />' +
            'Sonra tarayıcıda şu adresi açın: <code style="background:#fff;padding:2px 8px;border-radius:6px">http://127.0.0.1:5173/</code><br />' +
            '<small>Veya <code>calismiyo.bat</code> dosyasına çift tıklayın.</small>'
        }
      })()
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
